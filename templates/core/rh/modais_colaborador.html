{% load static %}

<!-- Modal Cadastro/Edição de Colaborador -->
<div class="modal fade" id="modalColaborador" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-lg modal-dialog-centered">
        <div class="modal-content border-0 shadow">
            <div class="modal-header bg-primary text-white border-0">
                <h5 class="modal-title fw-bold" id="modalTitle">Editar Colaborador</h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"
                    aria-label="Close"></button>
            </div>
            <form id="formColaborador" enctype="multipart/form-data">
                {% csrf_token %}
                <div class="modal-body p-4">
                    <input type="hidden" name="id">
                    <div class="row g-3">
                        <div class="col-md-12 text-center mb-3">
                            <div class="position-relative d-inline-block">
                                <img id="previewFoto" src="{% static 'img/avatar_placeholder.png' %}"
                                    class="rounded-circle border"
                                    style="width: 120px; height: 120px; object-fit: cover;">
                                <label for="inputFoto"
                                    class="position-absolute bottom-0 end-0 btn btn-sm btn-primary rounded-circle p-1">
                                    <i class="bi bi-camera-fill"></i>
                                </label>
                                <input type="file" id="inputFoto" name="foto" class="d-none" accept="image/*">
                            </div>
                        </div>
                        <div class="col-md-8">
                            <label class="form-label small fw-bold">Nome Completo</label>
                            <input type="text" name="nome_completo" class="form-control" required>
                        </div>
                        <div class="col-md-4">
                            <label class="form-label small fw-bold">CPF</label>
                            <input type="text" name="cpf" class="form-control" placeholder="000.000.000-00" required>
                        </div>
                        <div class="col-md-4">
                            <label class="form-label small fw-bold">Data de Nascimento</label>
                            <input type="date" name="data_nascimento" class="form-control" required>
                        </div>
                        <div class="col-md-4">
                            <label class="form-label small fw-bold">RG</label>
                            <input type="text" name="rg" class="form-control">
                        </div>
                        <div class="col-md-4">
                            <label class="form-label small fw-bold">Data de Admissão</label>
                            <input type="date" name="data_admissao" class="form-control" required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label small fw-bold">Departamento</label>
                            <select name="department_id" class="form-select" required>
                                {% for d in departments_all %}
                                <option value="{{ d.id }}">{{ d.name }}</option>
                                {% endfor %}
                            </select>
                        </div>
                        <div class="col-md-6" id="divCargo">
                            <label class="form-label small fw-bold">Cargo Atual</label>
                            <input type="text" name="cargo" class="form-control" required>
                        </div>
                        <div class="col-md-6" id="divCargoInicial">
                            <label class="form-label small fw-bold">Cargo Inicial (Admissão)</label>
                            <input type="text" name="cargo_inicial" class="form-control">
                            <small class="text-muted" style="font-size: 0.7rem;">Deixe vazio se for igual ao
                                atual</small>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label small fw-bold">Salário Atual</label>
                            <input type="number" step="0.01" name="salario_atual" class="form-control" required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label small fw-bold">Status</label>
                            <select name="status" class="form-select">
                                <option value="ativo">Ativo</option>
                                <option value="ferias">Férias</option>
                                <option value="afastado">Afastado</option>
                                <option value="desligado">Desligado</option>
                            </select>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label small fw-bold">Email Pessoal</label>
                            <input type="email" name="email_pessoal" class="form-control">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label small fw-bold">Telefone</label>
                            <input type="text" name="telefone" class="form-control" placeholder="(00) 00000-0000">
                        </div>
                        <div class="col-12">
                            <label class="form-label small fw-bold">Endereço</label>
                            <textarea name="endereco" class="form-control" rows="2"></textarea>
                        </div>
                    </div>
                </div>
                ...
                <!-- Modal Gerenciar Documentos -->
                <div class="modal fade" id="modalDocumentos" tabindex="-1" aria-hidden="true">
                    <div class="modal-dialog modal-lg modal-dialog-centered">
                        <div class="modal-content border-0 shadow">
                            <div class="modal-header bg-primary text-white border-0">
                                <h5 class="modal-title fw-bold">Documentos do Colaborador</h5>
                                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"
                                    aria-label="Close"></button>
                            </div>
                            <div class="modal-body p-4">
                                <!-- Upload Form -->
                                <form id="formUploadDocumento" class="mb-4 p-3 bg-light rounded-3">
                                    <h6 class="fw-bold mb-3 small">Novo Upload</h6>
                                    <div class="row g-2">
                                        <div class="col-md-5">
                                            <input type="text" name="nome" class="form-control form-control-sm"
                                                placeholder="Nome do documento (Ex: RG, Contrato)" required>
                                        </div>
                                        <div class="col-md-5">
                                            <input type="file" name="arquivo" class="form-control form-control-sm"
                                                required>
                                        </div>
                                        <div class="col-md-2">
                                            <button type="button" class="btn btn-sm btn-primary w-100"
                                                onclick="uploadDocumento()">Upload</button>
                                        </div>
                                    </div>
                                </form>

                                <!-- Listagem -->
                                <div class="table-responsive">
                                    <table class="table table-sm table-hover align-middle">
                                        <thead class="table-light">
                                            <tr>
                                                <th class="small py-2">Nome</th>
                                                <th class="small py-2 text-center">Data</th>
                                                <th class="small py-2 text-end">Ação</th>
                                            </tr>
                                        </thead>
                                        <tbody id="listaDocumentos">
                                            <!-- Preenchido via JS -->
                                        </tbody>
                                    </table>
                                </div>
                            </div>
                            <div class="modal-footer border-0 p-3">
                                <button type="button" class="btn btn-sm btn-light"
                                    data-bs-dismiss="modal">Fechar</button>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="modal-footer border-0 p-4">
                    <button type="button" class="btn btn-light" data-bs-dismiss="modal">Cancelar</button>
                    <button type="button" id="btnSalvarColaborador" class="btn btn-primary px-4">Salvar
                        Alterações</button>
                </div>
            </form>
        </div>
    </div>
</div>

<!-- Modal Registrar Evolução (Histórico) -->
<div class="modal fade" id="modalHistorico" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content border-0 shadow">
            <div class="modal-header bg-primary text-white border-0">
                <h5 class="modal-title fw-bold">Registrar Evolução Profissional</h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"
                    aria-label="Close"></button>
            </div>
            <form id="formHistorico">
                <div class="modal-body p-4">
                    <div class="row g-3">
                        <div class="col-12">
                            <label class="form-label small fw-bold">Tipo de Evento</label>
                            <select name="tipo_evento" class="form-select" required>
                                <option value="promocao">Promoção</option>
                                <option value="aumento_salarial">Aumento Salarial</option>
                                <option value="mudanca_funcao">Mudança de Função</option>
                                <option value="mudanca_departamento">Mudança de Departamento</option>
                            </select>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label small fw-bold">Data do Evento</label>
                            <input type="date" name="data_evento" class="form-control" value="{{ today|date:'Y-m-d' }}"
                                required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label small fw-bold">Novo Cargo (Opcional)</label>
                            <input type="text" name="cargo_novo" class="form-control" placeholder="Se houver mudança">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label small fw-bold">Novo Salário (Opcional)</label>
                            <input type="number" step="0.01" name="salario_novo" class="form-control">
                        </div>
                        <input type="hidden" name="cargo_anterior" value="{{ colaborador.cargo_atual }}">
                        <input type="hidden" name="salario_anterior" value="{{ colaborador.salario_atual }}">
                        <div class="col-12">
                            <label class="form-label small fw-bold">Observações</label>
                            <textarea name="observacoes" class="form-control" rows="3"></textarea>
                        </div>
                    </div>
                </div>
                <div class="modal-footer border-0 p-4">
                    <button type="button" class="btn btn-light" data-bs-dismiss="modal">Cancelar</button>
                    <button type="button" class="btn btn-primary px-4" onclick="saveHistorico()">Registrar</button>
                </div>
            </form>
        </div>
    </div>
</div>

<!-- Modal Registrar Performance/Feedback -->
<div class="modal fade" id="modalPerformance" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content border-0 shadow">
            <div class="modal-header bg-primary text-white border-0">
                <h5 class="modal-title fw-bold">Registrar Novo Feedback</h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"
                    aria-label="Close"></button>
            </div>
            <form id="formPerformance">
                <div class="modal-body p-4">
                    <div class="row g-3">
                        <div class="col-12">
                            <label class="form-label small fw-bold">Tipo</label>
                            <select name="tipo" class="form-select" required>
                                <option value="feedback">Feedback Geral</option>
                                <option value="pdi">PDI (Plano de Desenv.)</option>
                                <option value="avaliacao">Avaliação Periódica</option>
                                <option value="1on1">1:1 (One-on-One)</option>
                            </select>
                        </div>
                        <div class="col-12">
                            <label class="form-label small fw-bold">Título / Assunto</label>
                            <input type="text" name="titulo" class="form-control" placeholder="Ex: Feedback Mensal"
                                required>
                        </div>
                        <div class="col-12">
                            <label class="form-label small fw-bold">Comentários</label>
                            <textarea name="comentarios" class="form-control" rows="4" required></textarea>
                        </div>
                        <div class="col-12">
                            <label class="form-label small fw-bold">Próximos Passos</label>
                            <textarea name="proximos_passos" class="form-control" rows="2"></textarea>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label small fw-bold">Nota Quantitativa (0-10)</label>
                            <input type="number" step="0.1" min="0" max="10" name="nota" class="form-control">
                        </div>
                    </div>
                </div>
                <div class="modal-footer border-0 p-4">
                    <button type="button" class="btn btn-light" data-bs-dismiss="modal">Cancelar</button>
                    <button type="button" class="btn btn-primary px-4" onclick="savePerformance()">Salvar</button>
                </div>
            </form>
        </div>
    </div>
</div>
