# fly.toml app configuration file generated for gestao_reclame_aqui on 2025-11-13T20:30:00Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = "cshub"
primary_region = "gru"  # São Paulo

[build]

[env]
  PORT = "8080"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 256

